# ===============================
# BASIC APPLICATION SETTINGS
# ===============================
spring.application.name=Ayurkisan-Ecommerce
spring.config.import=optional:file:.env[.properties],optional:file:./backend/.env[.properties]
server.port=${SERVER_PORT:8080}

# ===============================
# MONGODB ATLAS
# ===============================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ecomproject}

# ===============================
# LOGGING (KEEP TERMINAL CLEAN)
# ===============================
logging.level.root=ERROR
logging.level.org.springframework=ERROR
logging.level.org.mongodb=ERROR
logging.level.com.mongodb=ERROR

# Show only startup message
spring.main.banner-mode=off
jwt.secret=${JWT_SECRET:change-this-jwt-secret-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# EMAIL CONFIGURATION
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
